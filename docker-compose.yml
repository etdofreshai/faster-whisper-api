services:
  faster-whisper-api:
    build: .
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_VAD: ${WHISPER_VAD:-false}
      API_KEY: ${API_KEY:-}
    volumes:
      - whisper-models:/models
    restart: unless-stopped

volumes:
  whisper-models:
